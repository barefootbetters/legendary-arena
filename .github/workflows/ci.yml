name: CI → Build → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Publish to npm + upload to R2 only on semver tags
  push:
    tags: ["v*.*.*"]

jobs:
  # ── 1. Validate card data ───────────────────────────────────────────────────
  validate:
    name: Validate Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run registry validation
        run: pnpm registry:validate
        env:
          CARDS_DIR: data/raw
          DATA_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0-dev' }}

      - uses: actions/upload-artifact@v4
        with:
          name: registry-health
          path: packages/registry/dist/registry-health.json

  # ── 2. Build dist/ ─────────────────────────────────────────────────────────
  build:
    name: Build Registry Dist
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Normalize cards
        run: pnpm registry:validate   # also writes cards.json + index.json
        env:
          DATA_VERSION: ${{ github.ref_name }}

      - name: Build TypeScript types
        run: pnpm registry:build

      - uses: actions/upload-artifact@v4
        with:
          name: registry-dist
          path: packages/registry/dist/

  # ── 3. Build viewer ────────────────────────────────────────────────────────
  build-viewer:
    name: Build Registry Viewer
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Download registry dist
        uses: actions/download-artifact@v4
        with: { name: registry-dist, path: packages/registry/dist }

      - name: Build viewer
        run: pnpm viewer:build

      - uses: actions/upload-artifact@v4
        with:
          name: viewer-dist
          path: apps/registry-viewer/dist/

  # ── 4. Upload to R2 (tags only) ────────────────────────────────────────────
  upload-r2:
    name: Upload to Cloudflare R2
    needs: [build, build-viewer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Download registry dist
        uses: actions/download-artifact@v4
        with: { name: registry-dist, path: packages/registry/dist }

      - name: Upload data + images to R2
        run: pnpm registry:upload
        env:
          DATA_VERSION:           ${{ github.ref_name }}
          R2_ACCOUNT_ID:          ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:       ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:   ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:         ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:          ${{ secrets.R2_PUBLIC_URL }}

  # ── 5. Publish to npm (tags only) ──────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: upload-r2
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Download registry dist
        uses: actions/download-artifact@v4
        with: { name: registry-dist, path: packages/registry/dist }

      - name: Publish @legendary-arena/registry
        run: pnpm publish --filter @legendary-arena/registry --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
